services:
  - type: web
    name: gatherpay-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn package -DskipTests
    startCommand: java -jar target/gatherpay-backend-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
